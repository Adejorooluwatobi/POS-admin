<!-- LOGIN SCREEN -->
<div id="loginScreen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background: radial-gradient(at 0% 0%, hsla(210,100%,90%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(190,100%,85%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(220,100%,90%,1) 0, transparent 50%); background-color: var(--bg); position: relative; overflow: hidden;">
  
  <!-- Subtle Abstract Shapes -->
  <div style="position:absolute; top:-10%; left:-10%; width:40%; height:40%; background:var(--accent-d); filter:blur(100px); border-radius:50%; z-index:0;"></div>
  <div style="position:absolute; bottom:-10%; right:-10%; width:30%; height:30%; background:var(--purple-d); filter:blur(80px); border-radius:50%; z-index:0;"></div>

  <div class="fade-up" style="width:100%; max-width:400px; padding:24px; position:relative; z-index:1;">
    
    <!-- Header -->
    <div style="text-align:center; margin-bottom:32px;">
      <div style="display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px; border-radius:16px; background:linear-gradient(135deg, var(--accent), var(--purple)); box-shadow:0 10px 20px var(--accent-d); margin-bottom:16px;">
        <span style="color:#fff; font-size:24px; font-weight:800; letter-spacing:-0.05em;">R</span>
      </div>
      <h1 style="font-size:28px; font-weight:800; letter-spacing:-0.04em; color:var(--text); margin-bottom:4px;">RetailOS Admin</h1>
      <p style="font-size:14px; color:var(--text3); font-weight:500;">Sign in to manage your business</p>
    </div>

    <!-- Login Card -->
    <div style="background:rgba(var(--surface-rgb, 255, 255, 255), 0.7); backdrop-filter:blur(12px); border:1px solid rgba(var(--border-rgb, 225, 231, 239), 0.5); border-radius:24px; padding:32px; box-shadow:0 20px 40px rgba(0,0,0,0.05);">
      
      <!-- Form -->
      <div style="margin-bottom:20px;">
        <label style="font-size:11px; font-weight:700; color:var(--text2); letter-spacing:0.05em; text-transform:uppercase; display:block; margin-bottom:8px; margin-left:4px;">Email Address</label>
        <div style="position:relative;">
          <input id="loginEmail" type="email" class="inp" placeholder="name@company.com" [(ngModel)]="email" 
                 style="background:var(--surface); border:1.5px solid var(--border); padding:12px 16px; font-size:14px; border-radius:12px; transition:all 0.2s;">
        </div>
      </div>

      <div style="margin-bottom:24px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; margin-left:4px;">
          <label style="font-size:11px; font-weight:700; color:var(--text2); letter-spacing:0.05em; text-transform:uppercase;">Password</label>
          <a href="javascript:void(0)" style="font-size:11px; color:var(--accent); font-weight:600; text-decoration:none;">Forgot?</a>
        </div>
        <input id="loginPassword" type="password" class="inp" placeholder="••••••••" [(ngModel)]="password"
               style="background:var(--surface); border:1.5px solid var(--border); padding:12px 16px; font-size:14px; border-radius:12px; transition:all 0.2s;">
      </div>

      <button (click)="doLogin()" [disabled]="isLoading()" class="btn btn-primary" 
              style="width:100%; justify-content:center; padding:14px; font-size:14px; font-weight:700; border-radius:12px; background:linear-gradient(to right, var(--accent), #0ea5e9); box-shadow:0 4px 12px var(--accent-d); border:none; transition:all 0.2s; cursor:pointer;">
        @if (isLoading()) {
          <span style="display:flex; align-items:center; gap:8px;">
            <svg class="animate-spin" style="width:16px; height:16px;" viewBox="0 0 24 24">
              <circle style="opacity:0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
              <path style="opacity:0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Signing in...
          </span>
        } @else {
          Sign In →
        }
      </button>

      @if (loginError()) {
        <div style="margin-top:16px; padding:10px; background:var(--red-d); color:var(--red); border-radius:10px; font-size:12px; text-align:center; font-weight:600; animation:shake 0.4s ease-in-out;">
          {{ loginError() }}
        </div>
      }
    </div>

    <!-- Demo Credentials (Subtle) -->
    <div style="margin-top:24px; text-align:center;">
      <p style="font-size:12px; color:var(--text3); margin-bottom:12px;">Need demo access?</p>
      <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px;">
        <div (click)="email='owner@retailos.ng'; password='owner123'" style="font-size:10px; padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text2); cursor:pointer; transition:all 0.2s;">👑 Admin</div>
        <div (click)="email='vi@retailos.ng'; password='store123'" style="font-size:10px; padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text2); cursor:pointer; transition:all 0.2s;">🏪 Manager</div>
        <div (click)="email='cashier@retailos.ng'; password='pin123'" style="font-size:10px; padding:6px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; color:var(--text2); cursor:pointer; transition:all 0.2s;">💰 Cashier</div>
      </div>
    </div>

    <!-- Theme Toggle & Footer -->
    <div style="display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:32px;">
      <div style="display:flex; align-items:center; gap:12px; padding:6px 12px; background:var(--surface2); border-radius:30px; border:1px solid var(--border);">
        <span style="font-size:12px;">☀</span>
        <div class="toggle" (click)="themeService.toggleTheme()"><div class="knob"></div></div>
        <span style="font-size:12px;">☾</span>
      </div>
      <div style="font-size:11px; color:var(--text3); font-weight:500;">&copy; 2026 RetailOS. All rights reserved.</div>
    </div>

  </div>
</div>

<style>
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }
  .animate-spin {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px var(--accent-d);
    filter: brightness(1.05);
  }
  .btn-primary:active {
    transform: translateY(0);
  }
  .inp:focus {
    background: var(--surface) !important;
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 4px var(--accent-d) !important;
  }
</style>
